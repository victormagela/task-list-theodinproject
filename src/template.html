<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Manager</title>
</head>
<body>
    <aside class="side-bar">
        <header>
            <h1>Project Manager</h1>
        </header>

        <div class="side-bar-content">
            <h2>Your Projects</h2>
            <nav>
                <ul id="projectList"></ul>
            </nav>
    
        </div>
        <button class="new-project-btn" id="newProjectBtn">New Project</button>
    </aside>

    <main>
        <h2>Project Details</h2>
        <p>Overview of your tasks</p>

        <section class="task-grid" id="taskGrid"></section>

        <button class="new-task-btn" id="newTaskBtn">+</button>
    </main>

    <!-- dialog window for creating a new project -->
    <dialog id="newProjectDialog">
        <form method="dialog" id="newProjectForm">
            <h3>New Project</h3>
            <div class="form-group">
                <label for="projectName">Project Name:</label>
                <input type="text" id="projectName" name="projectName" required>
            </div>
            <div class="form-group">
                <label for="projectDescription">Project Description:</label>
                <input type="text" id="projectDescription" name="projectDescription">
            </div>
            <div class="dialog-buttons">
                <button type="submit">Create</button>
                <button type="button" id="cancelBtn">Cancel</button>
            </div>
        </form>
    </dialog>

    <!-- dialog window for creating and editing a task -->
    <dialog id="taskDialog">
        <form method="dialog" id="taskForm">
            <h3 id="taskHeading">New Task</h3>
            <div class="form-group">
                <label for="taskName">Task Name:</label>
                <input type="text" id="taskName" name="taskName" required>
            </div>
            <div class="form-group">
                <label for="taskDescription">Task Description:</label>
                <input type="text" id="taskDescription" name="taskDescription">
            </div>
            <div class="form-group">
                <label for="taskDue">Task Due:</label>
                <input type="date" id="taskDue" name="taskDue">
            </div>
            <div class="form-group">
                <label for="taskPriority">Task Priority:</label>
                <select type="text" id="taskPriority" name="taskPriority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="dialog-buttons">
                <button type="submit" id="taskSubmitBtn"></button>
                <button type="button" id="cancelTaskBtn">Cancel</button>
            </div>
        </form>
    </dialog>
</body>
</html>
